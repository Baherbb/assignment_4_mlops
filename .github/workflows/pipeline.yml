# .github/workflows/pipeline.yml
name: ML Model Pipeline

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      force_accuracy:
        description: "Override accuracy for demo (e.g. 0.70 for a failure run). Leave empty for real training."
        required: false
        default: ""

jobs:
  # ── JOB 1: VALIDATE ────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Pull Training Data (DVC)
        run: dvc pull 2>/dev/null || echo "No DVC remote configured -- using built-in dataset"

      - name: Train Model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          FORCE_ACCURACY: ${{ github.event.inputs.force_accuracy }}
        run: python train.py

      - name: Persist model_info.txt as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Persist MLflow Tracking Data as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-data
          path: mlruns/

  # ── JOB 2: DEPLOY ──────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install mlflow

      - name: Download model_info.txt from Validate Job
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download MLflow Tracking Data from Validate Job
        uses: actions/download-artifact@v4
        with:
          name: mlflow-data
          path: mlruns

      - name: Check Accuracy Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py

      - name: Mock Docker Build
        run: echo "Building Docker image for Run ID: $(cat model_info.txt)"
